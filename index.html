<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Moon Clicker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1b2845 0, #050814 55%, #000 100%);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #game-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
      max-width: 1000px;
      margin-top: 20px;
    }

    #left-panel, #right-panel {
      background: rgba(10, 10, 25, 0.9);
      border-radius: 12px;
      padding: 16px;
      flex: 1 1 280px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    #stats {
      margin-bottom: 16px;
    }

    #stats p {
      margin: 4px 0;
    }

    #moon-button {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 4px solid #e0e0ff;
      background: radial-gradient(circle at 30% 30%, #fdfdfd 0, #d0d0e0 40%, #a0a0c0 70%, #707090 100%);
      box-shadow: 0 0 40px rgba(200, 200, 255, 0.6);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin: 0 auto;
      transition: transform 0.05s ease, box-shadow 0.1s ease;
    }

    #moon-button:active {
      transform: scale(0.96);
      box-shadow: 0 0 20px rgba(200, 200, 255, 0.4);
    }

    .crater {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #b0b0c8 0, #7a7a96 60%, #5a5a78 100%);
      opacity: 0.9;
    }

    .crater.small {
      width: 24px;
      height: 24px;
    }

    .crater.medium {
      width: 40px;
      height: 40px;
    }

    .crater.large {
      width: 60px;
      height: 60px;
    }

    #floating-text-container {
      position: relative;
      width: 100%;
      height: 0;
      pointer-events: none;
    }

    .floating-text {
      position: absolute;
      color: #fff7a8;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
      animation: floatUp 0.8s ease-out forwards;
      font-size: 14px;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-40px);
      }
    }

    #upgrades-title {
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .upgrade-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .upgrade-card {
      background: rgba(20, 20, 40, 0.9);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(120, 120, 200, 0.4);
    }

    .upgrade-info {
      max-width: 70%;
    }

    .upgrade-name {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .upgrade-desc {
      font-size: 12px;
      color: #c0c0ff;
      margin-bottom: 2px;
    }

    .upgrade-meta {
      font-size: 12px;
      color: #e0e0ff;
    }

    .upgrade-button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #4b6cff, #7f9bff);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 80px;
      transition: background 0.1s ease, transform 0.05s ease, opacity 0.1s ease;
    }

    .upgrade-button:active {
      transform: scale(0.96);
    }

    .upgrade-button.disabled {
      background: #444a70;
      cursor: not-allowed;
      opacity: 0.6;
    }

    #footer {
      margin-top: 16px;
      font-size: 12px;
      color: #b0b0d0;
      text-align: center;
    }

    #footer span {
      color: #ffe082;
    }

    @media (max-width: 700px) {
      #moon-button {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <h1>Moon Clicker</h1>
  <div id="subtitle">Harvest lunar dust, build your moon empire.</div>

  <div id="game-container">
    <div id="left-panel">
      <div id="stats">
        <p><strong>Moon Dust:</strong> <span id="moon-count">0</span></p>
        <p><strong>Per Click:</strong> <span id="per-click">1</span></p>
        <p><strong>Idle / sec:</strong> <span id="per-second">0</span></p>
      </div>

      <button id="moon-button" aria-label="Click the moon to gain moon dust">
        <div class="crater large" style="top: 40px; left: 120px;"></div>
        <div class="crater medium" style="top: 120px; left: 60px;"></div>
        <div class="crater small" style="top: 80px; left: 40px;"></div>
        <div class="crater small" style="top: 140px; left: 140px;"></div>
      </button>

      <div id="floating-text-container"></div>
    </div>

    <div id="right-panel">
      <div id="upgrades-title">Upgrades & Moon Industries</div>
      <div class="upgrade-list" id="upgrade-list">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <div id="footer">
    <span>Tip:</span> Stack click upgrades first, then go all‑in on idle miners.
  </div>

  <script src="state.js"></script>
  <script src="upgrades.js"></script>
  <script src="main.js"></script>
</body>
</html>
